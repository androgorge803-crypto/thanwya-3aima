<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fce4ec">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Karen 💗">
<title>Karen 💗</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Floating petals -->
<div id="petals" aria-hidden="true"></div>

<!-- Hero -->
<header class="hero">
  <div class="hero-hearts" aria-hidden="true">🌸 💗 🌸</div>
  <h1>Karen</h1>
  <p class="subtitle">Every day you shine brighter than yesterday ✨</p>
  <div class="date-badge" id="todayDate"></div>
</header>

<main class="container">

  <!-- Timers -->
  <section class="card" aria-label="مواعيد الامتحانات">
    <h2 class="card-title">⏳ مواعيد الامتحانات</h2>
    <div class="timers-grid">
      <div class="timer-box">
        <h3>📚 أول امتحان</h3>
        <div id="timer1" class="timer-display" aria-live="polite"></div>
      </div>
      <div class="timer-box">
        <h3>🎉 آخر امتحان</h3>
        <div id="timer2" class="timer-display" aria-live="polite"></div>
      </div>
    </div>
  </section>

  <!-- Bible verse -->
  <section class="card" aria-label="آية اليوم">
    <h2 class="card-title">📖 آية اليوم</h2>
    <div class="verse-box">
      <div class="verse-icon" aria-hidden="true">✝️</div>
      <p class="verse-text" id="verseText"></p>
      <p class="verse-ref" id="verseRef"></p>
    </div>
  </section>

  <!-- Love message -->
  <section class="card" aria-label="رسالة الحب">
    <h2 class="card-title">💌 رسالتي ليكي النهارده</h2>
    <p class="love-msg" id="loveMsg"></p>
  </section>

  <!-- Daily gift -->
  <section class="card" aria-label="هديتك اليوم">
    <h2 class="card-title">🎁 هديتك اليوم</h2>
    <div class="gift-section">
      <p class="gift-hint">اضغطي عشان تعرفي هديتك اليوم 🎀</p>
      <button class="gift-btn" onclick="revealGift()" aria-label="اكتشفي هديتك اليوم">
        🎁 هديتك اليوم!
      </button>
      <div class="gift-reveal" id="giftReveal" aria-live="polite">
        <div class="gift-card">
          <span class="gift-emoji" id="giftEmoji" aria-hidden="true"></span>
          <p class="gift-name" id="giftName"></p>
          <p class="gift-desc" id="giftDesc"></p>
        </div>
      </div>
    </div>
  </section>

</main>

<footer>
  💗بحبك يكارين ذاكري علشان خاطري💗
</footer>

<script src="app.js"></script>
</body>
</html>
